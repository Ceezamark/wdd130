<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Contact Us</title>

    <!-- Meta description -->
    <meta name="description"
      content="Get in touch with our whitewater rafting team. Contact us for bookings, questions, or adventure planning, we're here to help you plan your next river experience.">

    <!-- Meta author -->
    <meta name="author" content="Chineme Ndu-Okoronkwo">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <nav>
            <div>
                <img src="images/z-crossedoars.jpg" alt="Rapids company logo" width="200">
            </div>
            <div>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Company Info -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- Contact Form and Map -->
        <div class="contact-container">

            <!-- Google Map -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"
                  loading="lazy">
                </iframe>
            </div>

            <!-- Contact Form -->
            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <p>Message Purpose</p>
                <label><input type="radio" name="purpose" value="general" required> General
                    Inquiry</label>
                <label><input type="radio" name="purpose" value="reservation"> Reservation
                    Question</label>
                <label><input type="radio" name="purpose" value="suggestion"> Website
                    Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" , placeholder="Type here"
                  required></textarea>

                <label class="checkbox">
                    <input type="checkbox" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </div>

        <!-- Employees -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-profiles">
                <figure>
                    <img src="images/employee-1.jpg" alt="River Guide">
                    <figcaption>Emma Grace - Lead River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee-2.jpg" alt="Safety Instructor">
                    <figcaption>Jane Smith - Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee-3.jpg" alt="Trip Coordinator">
                    <figcaption>Olivia Rose - Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 | Rapids Rush Rafting | Chineme Ndu-Okoronkwo</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
