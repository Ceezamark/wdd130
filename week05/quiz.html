<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HTML & CSS Quiz</title>

    <meta name="description"
      content="Test your knowledge of HTML and CSS with this interactive quiz. Answer questions about web development fundamentals and improve your coding skills.">

    <meta name="author" content="Chineme Ndu-Okoronkwo">

    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="box">
        <h1>Basic HTML and CSS Quiz</h1>

        <form class="box">
            <div class="quiz-item box">
                <label for="q1">1. What does HTML stand for?</label><br>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="quiz-item box">
                <label for="q2">2. Explain the purpose of CSS in web development.</label><br>
                <textarea id="q2" name="q2"></textarea>
            </div>

            <div class="quiz-item box">
                <label for="q3">3. Which of the following is a CSS property?</label><br>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="color">color</option>
                    <option value="font-size">font-size</option>
                    <option value="background">background</option>
                </select>
            </div>

            <div class="quiz-item box">
                <label for="q4">4. How many heading levels are there in HTML?</label><br>
                <input type="number" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
